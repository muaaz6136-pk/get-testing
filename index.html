<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ecommerce Website</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:green;
    }

    header{
      background:#111;
      color:white;
      padding:15px 50px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    header h1{
      color:#00bcd4;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin-left:20px;
      transition:0.3s;
    }

    nav a:hover{
      color:#00bcd4;
    }

    .hero{
      height:400px;
      background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
      url('https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1200') center/cover;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      color:white;
      text-align:center;
    }

    .hero h2{
      font-size:50px;
      margin-bottom:10px;
    }

    .hero p{
      font-size:20px;
    }

    .btn{
      margin-top:20px;
      padding:12px 25px;
      border:none;
      background:#00bcd4;
      color:white;
      font-size:16px;
      cursor:pointer;
      border-radius:5px;
    }

    .products{
      padding:50px;
    }

    .products h2{
      text-align:center;
      margin-bottom:40px;
      font-size:35px;
    }

    .product-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:25px;
    }

    .card{
      background:white;
      border-radius:10px;
      overflow:hidden;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
    }

    .card img{
      width:100%;
      height:250px;
      object-fit:cover;
    }

    .card-content{
      padding:20px;
      text-align:center;
    }

    .card-content h3{
      margin-bottom:10px;
    }

    .price{
      color:#00bcd4;
      font-size:22px;
      margin-bottom:15px;
    }

    footer{
      background:#111;
      color:white;
      text-align:center;
      padding:20px;
      margin-top:40px;
    }
  </style>
</head>
<body>

  <header>
    <h1>MyShop</h1>

    <nav>
      <a href="#">Home</a>
      <a href="#">Products</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <h2>Best Online Store</h2>
    <p>Buy trendy products at amazing prices</p>
    <button class="btn">Shop Now</button>
  </section>

  <section class="products">
    <h2>Featured Products</h2>

    <div class="product-grid">

      <div class="card">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=600" alt="">
        <div class="card-content">
          <h3>Running Shoes</h3>
          <p class="price">$59</p>
          <button class="btn">Add to Cart</button>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?q=80&w=600" alt="">
        <div class="card-content">
          <h3>Camera</h3>
          <p class="price">$120</p>
          <button class="btn">Add to Cart</button>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=600" alt="">
        <div class="card-content">
          <h3>Smart Phone</h3>
          <p class="price">$299</p>
          <button class="btn">Add to Cart</button>
        </div>
      </div>

    </div>
  </section>

  <footer>
    <p>© 2026 MyShop. All Rights Reserved.</p>
  </footer>

</body>
</html>
